<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa konto - Sida 4</title>
    <link rel="stylesheet" href="sid4.css">
</head>
<body class="gray-bg">

    <header>
        <div class="header-left">
            <button class="hamburger-menu">&#9776;</button>
            
            <img src="images.png" alt="Restaurang logotyp" class="logo">
            
            <h1 class="restaurant-name">(Namn på vår resturang)</h1>
        
        <nav class="header-right">
            <a href="slut.html">Home</a>
            <a href="index.html">Food</a>
            <a href="#">About us</a>
            <a href="#" class="login-btn">Login</a>
        </nav>
    </header>

    <main class="signup-container">
        <h2 class="page-title">Create account</h2>
        
        <form class="signup-form">
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="firstName">First name</label>
                    <input type="text" id="firstName" name="firstName">
                </div>
                <div class="form-group half-width">
                    <label for="lastName">Last name</label>
                    <input type="text" id="lastName" name="lastName">
                </div>
            </div>

            <div class="form-group full-width">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group full-width">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </div>
        </form>
    </main>

</body>
</html>
