<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food - Vår Restaurang</title>
    <style>
        :root { --brand-teal: #007A8A; }
        body { background-color: #f4f5f5; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Header & Meny */
        .global-header { background-color: #ffffff; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 1px solid #ddd; position: relative; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .custom-hamburger { background: var(--brand-teal); border: none; padding: 8px 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .custom-hamburger span { display: block; width: 22px; height: 3px; background: white; }
        .logo-cart { font-size: 28px; text-decoration: none; color: inherit; }
        .restaurant-name { font-size: 18px; font-style: italic; font-weight: bold; color: #000; margin: 0; }
        
        .header-right { display: flex; gap: 10px; align-items: center; }
        .header-right a { text-decoration: none; color: #000; font-size: 14px; font-weight: bold; font-style: italic; padding: 8px 20px; border-radius: 8px; transition: 0.2s; }
        .btn-active-teal { background-color: var(--brand-teal) !important; color: white !important; font-style: normal !important; }
        
        .mobile-nav { display: none; flex-direction: column; background-color: #ffffff; width: 100%; position: absolute; top: 100%; left: 0; box-shadow: 0 10px 10px rgba(0,0,0,0.1); }
        .mobile-nav a { padding: 15px 30px; text-decoration: none; color: #000; font-weight: bold; border-bottom: 1px solid #eee; }
        @media (max-width: 991px) { .header-right { display: none; } }

        /* Sidans innehåll */
        main { max-width: 900px; margin: 40px auto; padding: 0 20px; width: 100%; }
        .section-title { text-align: center; font-style: italic; font-size: 22px; margin-bottom: 25px; }
        .filter-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { background-color: #ffffff; border: 1px solid #ddd; padding: 8px 24px; border-radius: 20px; font-weight: bold; font-style: italic; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background-color: var(--brand-teal); color: white; border-color: var(--brand-teal); }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .menu-card { background-color: #ffffff; border-radius: 8px; height: 120px; border: 1px solid #dcdcdc; }
    </style>
</head>
<body>

    <header class="global-header">
        <div class="header-left">
            <button class="custom-hamburger" onclick="const m=document.getElementById('mobile-menu'); m.style.display=m.style.display==='flex'?'none':'flex';">
                <span></span><span></span><span></span>
            </button>
            <a href="ShoppingCart2.html" class="logo-cart">🛒</a>
            <h1 class="restaurant-name">(Namn på vår resturang)</h1>
        </div>
        
        <nav class="header-right">
            <a href="Slut.html">Home</a>
            <!-- AKTIV PÅ FOOD -->
            <a href="index.html" class="btn-active-teal">Food</a>
            <a href="about.html">About us</a>
            <a href="Login.html" style="background-color: var(--brand-teal); color: white; font-style: normal;">Login</a>
        </nav>

        <div id="mobile-menu" class="mobile-nav">
            <a href="Slut.html">Home</a>
            <a href="index.html" style="color: var(--brand-teal);">Food</a>
            <a href="about.html">About us</a>
            <a href="ShoppingCart2.html">Kundvagn</a>
            <a href="Login.html">Login</a>
        </div>
    </header>

    <main>
        <h2 class="section-title">Our Menu</h2>
        
        <div class="filter-buttons">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Pizza</button>
            <button class="filter-btn">Burgers</button>
            <button class="filter-btn">Salads</button>
            <button class="filter-btn">Desserts</button>
        </div>

        <div class="menu-grid">
            <div class="menu-card"></div>
            <div class="menu-card"></div>
            <div class="menu-card"></div>
            <div class="menu-card"></div>
            <div class="menu-card"></div>
            <div class="menu-card"></div>
        </div>
    </main>

</body>
</html>
